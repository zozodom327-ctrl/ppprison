<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Femdom Cage Bingo Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #d63384; --deep: #8b1a4a; --magenta: #c2185b; --soft: #fce4ec; --dark: #1a0010;
  }
  body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #1a0010 0%, #3d0030 40%, #1a0010 100%); min-height: 100vh; color: #fff; }
  #tool { display: flex; gap: 24px; padding: 28px; min-height: 100vh; }
  .panel { background: rgba(255,255,255,0.06); border: 1px solid rgba(214,51,132,0.3); border-radius: 16px; padding: 22px; backdrop-filter: blur(8px); }
  .left-panel { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; gap: 18px; }
  h1 { font-family: 'Fredoka One', cursive; font-size: 1.7rem; color: #ff80b4; text-shadow: 0 0 20px rgba(214,51,132,0.6); line-height: 1.1; }
  h1 span { color: #fff; }
  label { display: block; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #ff80b4; margin-bottom: 6px; }
  input[type="text"] { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(214,51,132,0.4); border-radius: 8px; padding: 10px 14px; color: #fff; font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 600; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: #d63384; }
  input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
  .messages-header { display: flex; justify-content: space-between; align-items: center; }
  .count-badge { background: rgba(214,51,132,0.3); border: 1px solid rgba(214,51,132,0.5); border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-weight: 800; color: #ff80b4; }
  #messageList { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; max-height: 380px; padding-right: 4px; }
  #messageList::-webkit-scrollbar { width: 4px; }
  #messageList::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
  #messageList::-webkit-scrollbar-thumb { background: rgba(214,51,132,0.5); border-radius: 4px; }
  .msg-row { display: flex; gap: 6px; align-items: stretch; }
  .msg-row input { flex: 1; padding: 7px 10px; font-size: 0.82rem; }
  .msg-row .num { width: 24px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; color: rgba(255,255,255,0.35); font-weight: 700; }
  .del-btn { background: rgba(214,51,132,0.15); border: 1px solid rgba(214,51,132,0.3); border-radius: 6px; color: #ff80b4; cursor: pointer; font-size: 0.9rem; padding: 0 8px; transition: background 0.15s; flex-shrink: 0; }
  .del-btn:hover { background: rgba(214,51,132,0.4); }
  .add-btn { background: rgba(214,51,132,0.15); border: 1px dashed rgba(214,51,132,0.5); border-radius: 8px; color: #ff80b4; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700; padding: 8px; text-transform: uppercase; letter-spacing: 0.08em; transition: background 0.2s; width: 100%; }
  .add-btn:hover { background: rgba(214,51,132,0.3); }
  .generate-btn { background: linear-gradient(135deg, #d63384, #8b1a4a); border: none; border-radius: 12px; color: #fff; cursor: pointer; font-family: 'Fredoka One', cursive; font-size: 1.2rem; letter-spacing: 0.05em; padding: 14px; text-transform: uppercase; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 4px 20px rgba(214,51,132,0.4); width: 100%; }
  .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .warning { background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.4); border-radius: 8px; color: #ff8080; font-size: 0.78rem; font-weight: 700; padding: 8px 12px; text-align: center; display: none; }
  .right-panel { flex: 1; display: flex; flex-direction: column; gap: 16px; align-items: center; }
  .preview-actions { display: flex; gap: 12px; align-items: center; }
  .print-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; color: #fff; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 10px 20px; letter-spacing: 0.05em; text-transform: uppercase; transition: background 0.2s; }
  .print-btn:hover { background: rgba(255,255,255,0.2); }
  #cardWrap { position: relative; display: inline-block; }
  #bgImg { display: block; max-height: calc(100vh - 140px); max-width: 100%; width: auto; }
  #cardCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .empty-state { width: 400px; height: 500px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; border: 2px dashed rgba(214,51,132,0.3); border-radius: 16px; color: rgba(255,255,255,0.3); font-size: 0.9rem; font-weight: 600; }
  .empty-state .icon { font-size: 3rem; }
  @media print {
    body { background: white !important; }
    #tool { display: block; padding: 0; }
    .left-panel, .preview-actions { display: none !important; }
    .right-panel { display: block; }
    #cardWrap { display: block; }
    #bgImg { max-height: none; max-width: 100%; }
  }
</style>
</head>
<body>
<div id="tool">
  <div class="left-panel panel">
    <div><h1>Femdom Cage<br><span>Bingo</span> Generator</h1></div>
    <div>
      <label>Player Name</label>
      <input type="text" id="playerName" placeholder="Enter player's name…">
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:10px;overflow:hidden;">
      <div class="messages-header">
        <label style="margin:0">Messages <span style="color:rgba(255,255,255,0.4);font-weight:400;text-transform:none;letter-spacing:0">(need 9+)</span></label>
        <span class="count-badge" id="countBadge">25</span>
      </div>
      <div id="messageList"></div>
      <button class="add-btn" onclick="addMessage()">+ Add Message</button>
    </div>
    <div id="warning" class="warning">Need at least 9 messages to generate a card.</div>
    <button class="generate-btn" onclick="generateCard()">🎲 Generate Card</button>
  </div>
  <div class="right-panel">
    <div class="preview-actions">
      <span style="font-size:0.8rem;color:rgba(255,255,255,0.4);font-weight:600;">Each click generates a new random card</span>
      <button class="print-btn" onclick="window.print()">🖨️ Print Card</button>
    </div>
    <div id="previewArea">
      <div class="empty-state">
        <div class="icon">🎴</div>
        <div>Fill in the details and click Generate Card</div>
      </div>
    </div>
  </div>
</div>

const DEFAULT_MESSAGES = [
  "How do I get claimed",
  "When can I post in beg to DM?",
  "Get your roles",
  "No male switches",
  "Omg I just want someone to use/degrade me/etc",
  "Sub gets annoyed when dominant acts dominant",
  "Dom messages, 5+ replies of \"HI\" \"How are you\" etc",
  "Someone gets gagged",
  "Someone has to write hand written lines",
  "2 doms fight",
  "Bot messages in general chat",
  "Marmite makes a dad joke",
  "People speak another language",
  "Where are all the doms",
  "Dom gives a task",
  "Dom mentions missing/misspelled honorifics",
  "Someone gets called a \"good boy\"",
  "Cuddle role play",
  "I'm bored",
  "Sub requests punishment",
  "Someone mentions feet (free space)",
  "Gendered slur",
  "Animal noises",
  "I'm horny",
  "Politics",
];

let messages = [...DEFAULT_MESSAGES];

// ==================== TWEAKABLE 3x3 BOXES ====================
// Format: { x, y, w, h }  → all values are in PIXELS on the original image
// x = left position, y = top position, w = width, h = height
const CARD = {
  debug: false,                    // Set to false when you're happy with alignment
  name: { x: 0.5, y: 0.33 },      // Player name position (fraction of image)

  boxes: [                        // Row 1
    { x: 20,  y: 385, w: 140, h: 120 },   // Box 1 (top-left)
    { x: 235,  y: 385, w: 140, h: 120 },   // Box 2 (top-middle)
    { x: 450,  y: 385, w: 140, h: 120 },   // Box 3 (top-right)

    // Row 2
    { x: 20,  y: 560, w: 140, h: 120 },   // Box 4
    { x: 235,  y: 560, w: 140, h: 120 },   // Box 5
    { x: 450,  y: 560, w: 140, h: 120 },   // Box 6

    // Row 3
    { x: 20,  y: 735, w: 140, h: 120 },   // Box 7 (bottom-left)
    { x: 235,  y: 735, w: 140, h: 120 },   // Box 8
    { x: 450,  y: 735, w: 140, h: 120 }    // Box 9 (bottom-right)
  ]
};

// ==================== HELPER FUNCTIONS ====================
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function renderMessageList() {
  const list = document.getElementById('messageList');
  list.innerHTML = '';
  messages.forEach((msg, i) => {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.innerHTML = `
      <div class="num">${i+1}</div>
      <input type="text" value="${escHtml(msg)}" oninput="messages[${i}]=this.value;updateCount()" placeholder="Message ${i+1}…">
      <button class="del-btn" onclick="deleteMessage(${i})">×</button>
    `;
    list.appendChild(row);
  });
  updateCount();
}

function updateCount() {
  document.getElementById('countBadge').textContent = messages.filter(m => m.trim()).length;
}

function addMessage() {
  messages.push('');
  renderMessageList();
  setTimeout(() => {
    const l = document.getElementById('messageList');
    l.scrollTop = l.scrollHeight;
  }, 50);
}

function deleteMessage(i) {
  messages.splice(i, 1);
  renderMessageList();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ==================== DRAWING FUNCTIONS ====================
function generateCard() {
  const valid = messages.filter(m => m.trim());
  if (valid.length < 9) {
    document.getElementById('warning').style.display = 'block';
    return;
  }
  document.getElementById('warning').style.display = 'none';

  const chosen = shuffle(valid).slice(0, 9);
  const name = document.getElementById('playerName').value.trim() || 'Player';

  const area = document.getElementById('previewArea');
  area.innerHTML = `<div id="cardWrap"><img id="bgImg" alt="Bingo Card"><canvas id="cardCanvas"></canvas></div>`;

  const img = document.getElementById('bgImg');
  img.onload = () => drawCard(img, chosen, name);
  img.src = 'data:image/png;base64,' + IMAGE_B64;
}

function drawCard(img, chosen, name) {
  const canvas = document.getElementById('cardCanvas');
  const W = img.naturalWidth;
  const H = img.naturalHeight;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');

  // Draw player name
  const namePos = CARD.name;
  const nameY = namePos.y * H;
  const nameFontSize = Math.round(H * 0.042);
  ctx.font = `800 ${nameFontSize}px 'Fredoka One', cursive`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.strokeStyle = '#8b1a4a';
  ctx.lineWidth = nameFontSize * 0.18;
  ctx.lineJoin = 'round';
  ctx.strokeText(name, W * namePos.x, nameY);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(name, W * namePos.x, nameY);

  // Draw the 9 boxes + text
  chosen.forEach((text, i) => {
    const box = CARD.boxes[i];
    drawBoxAndText(ctx, text, box, W, H);
  });
}

function drawBoxAndText(ctx, text, box, W, H) {
  // Optional debug outline (remove when finished)
  if (CARD.debug) {
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3;
    ctx.strokeRect(box.x, box.y, box.w, box.h);
  }

  const centerX = box.x + box.w / 2;
  const centerY = box.y + box.h / 2;
  const maxWidth = box.w * 0.88;     // 12% padding on sides
  const maxHeight = box.h * 0.82;    // 18% padding top/bottom

  // Find best font size that fits
  let fontSize = Math.round(box.h * 0.28);  // starting size
  const minFontSize = Math.round(box.h * 0.12);
  let lines = [];

  while (fontSize >= minFontSize) {
    ctx.font = `700 ${fontSize}px 'Nunito', sans-serif`;
    lines = wrapText(ctx, text, maxWidth);

    const totalTextHeight = lines.length * fontSize * 1.22;
    if (totalTextHeight <= maxHeight) break;

    fontSize -= 1;
  }

  // Draw the text centered in the box
  ctx.font = `700 ${fontSize}px 'Nunito', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const lineHeight = fontSize * 1.22;
  const totalHeight = lines.length * lineHeight;
  let startY = centerY - totalHeight / 2 + lineHeight / 2;

  lines.forEach((line, i) => {
    const y = startY + i * lineHeight;

    // Dark outline for readability
    ctx.strokeStyle = 'rgba(90,0,40,0.95)';
    ctx.lineWidth = fontSize * 0.22;
    ctx.lineJoin = 'round';
    ctx.strokeText(line, centerX, y);

    // White fill
    ctx.fillStyle = '#ffffff';
    ctx.fillText(line, centerX, y);
  });
}

function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && current) {
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}
