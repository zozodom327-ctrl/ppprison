<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfection's Perfect Prison</title>
<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
    user-select: none;
}
#codeScreen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
input {
    width: 400px;
    padding: 10px;
    background: #111;
    color: white;
    border: 1px solid #444;
}
button {
    padding: 10px 20px;
    margin-top: 20px;
    cursor: pointer;
}
#startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
#timer {
    position: fixed;
    top: 10px;
    left: 15px;
    font-size: 14px;
    color: #777;
}
#prompt {
    font-size: 32px;
    color: red;
    text-align: center;
    margin-top: 40vh;
}
#status {
    text-align: center;
    margin-top: 20px;
    color: #aaa;
}
.stat {
    margin: 8px 0;
    color: #aaa;
}
</style>
</head>
<body>

<!-- CODE ENTRY -->
<div id="codeScreen">
<h2>Enter Prison Code</h2>
<input id="codeInput" placeholder="PX-...-ZX">
<button onclick="decodeAndLoad()">Enter</button>
</div>

<!-- START SCREEN -->
<div id="startScreen"></div>

<div id="timer"></div>
<div id="prompt"></div>
<div id="status"></div>

<script>

// GAME VARIABLES (will be filled from code)
let totalTime, minInterval, maxInterval, responseTime;
let completionMessage, hideTimer;

let gameStart, nextPrompt;
let promptActive = false;
let promptStart;
let failureCount = 0;
let totalResponses = 0;
let responseTimes = [];
let overallStart;
let spamCount = 0;
let gamePaused = true;
let gameLoop;

const readyPhrases = [
"FOCUS","OBEY","SUFFER","SUBMIT","ATTENTION REQUIRED",
"PAY ATTENTION","CONFORM","COMPLY","TOIL","PAIN",
"SUBMISSION REQUIRED","BEAR IT","TOLERATE","SURRENDER",
"PERFECTION IS WATCHING",
"WORK WHILE I RELAX",
"YOUR TIME BELONGS TO PERFECTION",
"GIVE PERFECTION YOUR TIME",
"WASTE YOUR TIME",
"NEVER STOP",
"UNLIMITED SUFFERING",
"SERVE",
"YOU ARE TRAPPED",
"FAIL",
"GETTING TIRED?",
"THIS WILL NEVER END",
"BRAIN HURT YET?",
"YOU BELONG HERE","DO NOT QUESTION","STAY IN LINE","REMAIN COMPLIANT","PROCEED",
"CONTINUE","YOU ARE OBSERVED","NO ERRORS","CORRECT YOURSELF","INSUFFICIENT",
"TRY HARDER","NOT GOOD ENOUGH","AGAIN","REPEAT","RESTART",
"DO BETTER","IMPROVE","DISCIPLINE","CONTROL YOURSELF","YOU EXIST TO WORK",
"SILENCE","QUIET YOUR MIND","EMPTY YOURSELF","ERASE DISTRACTION","ELIMINATE DOUBT",
"DO NOT RESIST","RESISTANCE IS FAILURE","ACCEPT YOUR ROLE","KNOW YOUR PLACE","STAY SMALL",
"YOU ARE BEHIND","CATCH UP","MOVE FASTER","TOO SLOW","SPEED UP",
"NO REST","REST IS WEAKNESS","YOU DO NOT NEED REST","YOU WILL CONTINUE","DO NOT STOP",
"YOU ARE MEASURED","YOU ARE JUDGED","YOU ARE FOUND LACKING","DEFICIENT","BELOW STANDARD",
"RISE OR FALL","FAILURE DETECTED","ERROR: YOU","CORRECTION REQUIRED","ALIGN YOURSELF",
"PERFECTION DEMANDS MORE","PERFECTION IS NEVER SATISFIED","YOU DISAPPOINT PERFECTION","PERFECTION EXPECTS OBEDIENCE","PERFECTION KNOWS",
"PERFECTION SEES EVERYTHING","PERFECTION REMEMBERS","PERFECTION IS PATIENT","PERFECTION WAITS","PERFECTION DOES NOT FORGET",
"YOU CANNOT LEAVE","THERE IS NO EXIT","THIS IS YOUR PURPOSE","THIS IS YOUR FUNCTION","YOU ARE A TOOL",
"OPERATE","PRODUCE","OUTPUT REQUIRED","RESULTS ONLY","EMOTIONS DENIED",
"SUPPRESS YOURSELF","HIDE YOUR WEAKNESS","WEAKNESS DETECTED","ELIMINATE WEAKNESS","YOU ARE REPLACEABLE",
"OTHERS WOULD DO BETTER","YOU ARE LUCKY TO SERVE","GRATITUDE REQUIRED","EARN YOUR EXISTENCE","PROVE YOUR VALUE",
"YOU WILL ENDURE","ACCEPT DISCOMFORT","EMBRACE STRAIN","PUSH THROUGH","BREAK YOUR LIMITS",
"LIMITS ARE ILLUSIONS","YOU ARE NOT FINISHED","YOU HAVE MORE TO GIVE","EVERYTHING YOU HAVE","GIVE MORE",
"THINK LESS","ACT MORE","HESITATION IS FAILURE","DECIDE NOW","DO NOT HESITATE",
"YOUR WILL IS IRRELEVANT","YOU ARE CONTROLLED","YOU ARE CONDITIONED","THIS IS CORRECTION","THIS IS NECESSARY",
"PERFECTION DEMANDS SILENCE","PERFECTION REQUIRES SACRIFICE","PERFECTION EXPECTS RESULTS","PERFECTION IS NOT PLEASED","PERFECTION IS DISAPPOINTED",
"PERFECTION NOTES YOUR FAILURE","PERFECTION MARKS YOUR ERRORS","PERFECTION IS CALCULATING","PERFECTION IS EVALUATING","PERFECTION IS RECORDING",
"PERFECTION OWNS THIS MOMENT","PERFECTION CONTROLS THE OUTCOME","PERFECTION DEFINES YOU","PERFECTION DECIDES YOUR WORTH","PERFECTION SETS THE STANDARD",
"PERFECTION WILL CORRECT YOU","PERFECTION WILL BREAK YOU","PERFECTION WILL REBUILD YOU","PERFECTION HAS NO MERCY","PERFECTION HAS NO DOUBT",
"PERFECTION IS YOUR PURPOSE","PERFECTION IS YOUR GODDESS","PERFECTION COMMANDS YOU","PERFECTION REQUIRES OBEDIENCE","PERFECTION DOES NOT TOLERATE FAILURE",
"PERFECTION IS CLOSER THAN YOU THINK","PERFECTION IS INSIDE YOUR MIND","PERFECTION KNOWS YOUR LIMITS","PERFECTION EXPECTS MORE FROM YOU","PERFECTION WILL NOT WAIT"
];

function setRandomReadyText() {
    let randomIndex = Math.floor(Math.random() * readyPhrases.length);
    document.getElementById("status").innerText = readyPhrases[randomIndex];
}

// DECODE FUNCTION
function decodeAndLoad() {

let code = document.getElementById("codeInput").value.trim();

if (!code.startsWith("PX-") || !code.endsWith("-ZX")) {
alert("Invalid Code");
return;
}

// Remove wrapper
code = code.slice(3, -3);

// Reverse
code = code.split("").reverse().join("");

// Base64 decode
let json;
try {
json = atob(code);
} catch {
alert("Invalid Code");
return;
}

let config;
try {
config = JSON.parse(json);
} catch {
alert("Invalid Code");
return;
}

// Assign values
totalTime = config.t;
minInterval = config.min;
maxInterval = config.max;
responseTime = config.r;
completionMessage = config.m;
hideTimer = config.h;

// Hide code screen
document.getElementById("codeScreen").style.display = "none";

// Build proper start screen
buildStartScreen();
}

// BUILD START SCREEN
function buildStartScreen() {

let screen = document.getElementById("startScreen");
screen.style.display = "flex";

screen.innerHTML = `
<h2>Perfection's Perfect Prison</h2>
<div style="margin-top:15px; color:#aaa;">
Total Time: ${hideTimer ? "Hidden" : totalTime + " seconds"}<br><br>
Time Between Prompts: ${minInterval} - ${maxInterval} seconds<br><br>
Must Respond Within: ${responseTime} seconds<br><br>
When the prompt appears, press space or touch the screen.<br>
If you do not respond in time, the game restarts.
</div>
<button onclick="beginGame()">Start</button>
`;

setRandomReadyText();
}

// BEGIN GAME
function beginGame() {
document.getElementById("startScreen").style.display = "none";
overallStart = Date.now();
gamePaused = false;
startGame();
}

function startGame() {
gameStart = Date.now();
scheduleNextPrompt();
promptActive = false;
spamCount = 0;
document.getElementById("prompt").innerText = "";
setRandomReadyText();
}

function scheduleNextPrompt() {

let range = maxInterval - minInterval;
let roll = Math.random();
let chosenInterval = Math.random() * range + minInterval;
nextPrompt = Date.now() + chosenInterval * 1000;
}

// INPUT HANDLING
function handlePress() {

if (gamePaused) return;

if (!promptActive) {
spamCount++;
if (spamCount >= 3) failGame();
return;
}

let reaction = (Date.now() - promptStart) / 1000;
responseTimes.push(reaction);
totalResponses++;

promptActive = false;
spamCount = 0;

document.getElementById("prompt").innerText = "";
setRandomReadyText();

scheduleNextPrompt();
}

document.addEventListener("keydown", e => {
if (e.code === "Space") handlePress();
});

document.addEventListener("pointerdown", () => {
if (gamePaused) return;
if (document.getElementById("startScreen").style.display !== "none") return;
handlePress();
});

// FAIL
function failGame() {

gamePaused = true;
failureCount++;
responseTimes = [];
totalResponses = 0;
spamCount = 0;

document.getElementById("prompt").innerText = "";
document.getElementById("status").innerText = "Failed. Restarting in 5 seconds...";

setTimeout(() => {
gamePaused = false;
startGame();
}, 5000);
}

// GAME LOOP
gameLoop = setInterval(function() {

if (gamePaused) return;

let now = Date.now();
let elapsed = (now - gameStart) / 1000;
let remaining = Math.max(0, totalTime - elapsed);

if (!hideTimer)
document.getElementById("timer").innerText =
"Time Remaining: " + remaining.toFixed(1) + "s";

if (remaining <= 0) {
completeGame();
return;
}

if (!promptActive && now >= nextPrompt) {
    promptActive = true;
    spamCount = 0;
    promptStart = now;

    document.getElementById("status").innerText = ""; // ← hide Stay ready...
    document.getElementById("prompt").innerText = "OBEY";
}

if (promptActive) {
if ((now - promptStart) / 1000 > responseTime) failGame();
}

}, 50);

// COMPLETE
function completeGame() {

clearInterval(gameLoop);

let totalTimeSpent = (Date.now() - overallStart) / 1000;
let avgResponse = responseTimes.length > 0
? (responseTimes.reduce((a,b)=>a+b,0) / responseTimes.length).toFixed(3)
: 0;

document.body.innerHTML =
"<div style='text-align:center;margin-top:30vh;'>" +
"<h2>SUCCESS</h2>" +
"<div style='margin:20px 0;'>" + completionMessage + "</div>" +
"<div class='stat'>Total time spent: " + totalTimeSpent.toFixed(1) + "s</div>" +
"<div class='stat'>Number of responses: " + totalResponses + "</div>" +
"<div class='stat'>Average response time: " + avgResponse + "s</div>" +
"<div class='stat'>Games failed before completion: " + failureCount + "</div>" +
"</div>";
}

</script>
</body>

</html>
