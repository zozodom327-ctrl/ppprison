<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfection's Spooky Maze</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(#111,#050505);
color:white;
text-align:center;
margin:0;
transition:background 2s;
}

/* dark vignette */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at center,
transparent 40%,
rgba(0,0,0,0.7) 100%);
}

body.exitMoved{
background:#220000;
}

.screen{display:none}
.active{display:block}

#maze{
margin:auto;
display:grid;
gap:1px;
background:#333;
width:fit-content;
animation:flicker 6s infinite, breathe 8s infinite;
}

.spookyTitle{
font-family:'Creepster', cursive;
font-size:72px;
color:white;
letter-spacing:3px;
margin-top:40px;
margin-bottom:20px;
text-shadow:
0 0 6px rgba(255,255,255,0.8),
0 0 12px rgba(255,255,255,0.4),
0 4px 8px rgba(0,0,0,0.8);
}

.sizeButton{
background:#222;
color:white;
border:1px solid #555;
}

.sizeButton.activeSize{
background:#8b0000;
border:1px solid red;
box-shadow:0 0 10px red;
}

#rushScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}

#rushText{
font-family:'Creepster', cursive;
font-size:64px;
text-align:center;
color:white;
letter-spacing:2px;
text-shadow:
0 0 6px rgba(255,255,255,0.8),
0 0 12px rgba(255,255,255,0.4);
}

.cell{
width:clamp(10px, 2.8vw, 28px);
height:clamp(10px, 2.8vw, 28px);
}

/* grimy maze paths */
.path{
background:#bfbfbf;
box-shadow: inset 0 0 6px rgba(0,0,0,0.7);
}

/* glowing player */
.player{
background:#7CFF7C;
box-shadow:0 0 12px #00ff00;
opacity:1;
transition:opacity 2.5s linear;
}

/* ominous exit */
.exit{
background:#8b0000;
box-shadow:0 0 8px red;
animation:exitPulse 2s infinite;
}

#topbar{
display:flex;
justify-content:space-between;
width:80%;
margin:auto;
margin-bottom:10px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin:5px;
}

#mazeContainer{
position:relative;
display:flex;
justify-content:center;
align-items:center;
width:100%;
height:70vh;
}

#maze.locked{
pointer-events:none;
}

@keyframes exitPulse{
0%{box-shadow:0 0 6px red}
50%{box-shadow:0 0 16px red}
100%{box-shadow:0 0 6px red}
}

@keyframes flicker{
0%{filter:brightness(1)}
48%{filter:brightness(1)}
50%{filter:brightness(0.92)}
52%{filter:brightness(1)}
100%{filter:brightness(1)}
}

@keyframes breathe{
0%{transform:scale(1)}
50%{transform:scale(1.005)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div id="rushScreen">
<div id="rushText">
What's the rush?<br><br>
<span id="rushTimer">10</span>
</div>
</div>

<!-- START SCREEN -->

<div id="startScreen" class="screen active">

<h1 class="spookyTitle">Perfection's Spooky Maze</h1>

<p>Select Maze Size</p>

<button id="sizeSmall" class="sizeButton" onclick="setMazeSize(30,'Small',this)">Small</button>
<button id="sizeMedium" class="sizeButton activeSize" onclick="setMazeSize(40,'Medium',this)">Medium</button>
<button id="sizeLarge" class="sizeButton" onclick="setMazeSize(50,'Large',this)">Large</button>

<br><br>

<button onclick="startGame()">Generate Maze</button>

</div>

<!-- GAME -->

<div id="gameScreen" class="screen">

<h1 class="spookyTitle">Perfection's Spooky Maze</h1>

<div id="topbar">
<div>Time: <span id="timer">00:00:00s</span></div>
<div>Spaces Moved: <span id="moves">0</span></div>
</div>

<div id="mazeContainer">
<div id="maze"></div>
</div>

</div>

<!-- END -->

<div id="endScreen" class="screen">
<h1 class="spookyTitle">Perfection's Spooky Maze</h1>
<h2>You made it out!</h2>
<div id="finalStats"></div>
</div>

<script>

let size = 40
let mazeSizeLabel = "Medium"

let maze=[]
let player={x:1,y:1}

let exits=[]
let activeExit=null

let moves=0
let cooldown=false

let startTime
let timerInterval

let listenForRush=false
let forcedExitMoveTriggered=false

let lastClickTime=0
let rushActive=false
let rushCount=0

let gameID=Math.floor(100000000+Math.random()*900000000)

function setMazeSize(newSize,label,button){

size=newSize
mazeSizeLabel=label

document.querySelectorAll(".sizeButton").forEach(b=>{
b.classList.remove("activeSize")
})

button.classList.add("activeSize")

}

document.addEventListener("click",function(){

if(listenForRush && !rushActive){
triggerRush()
}

})

function startGame(){

document.getElementById("timer").innerText="00:00:00s"

document.getElementById("startScreen").classList.remove("active")
document.getElementById("gameScreen").classList.add("active")

generateMaze()
findEdgeExits()

startTime=Date.now()
timerInterval=setInterval(updateTimer,1000)

scheduleExitMove()

render()

}

function updateTimer(){

let t=Math.floor((Date.now()-startTime)/1000)

document.getElementById("timer").innerText=formatTime(t)

}

function generateMaze(){

maze=[]

for(let y=0;y<size;y++){

maze[y]=[]

for(let x=0;x<size;x++){
maze[y][x]=0
}

}

function carve(x,y){

maze[y][x]=1

let dirs=[[2,0],[-2,0],[0,2],[0,-2]]
dirs.sort(()=>Math.random()-0.5)

for(let d of dirs){

let nx=x+d[0]
let ny=y+d[1]

if(nx>0 && ny>0 && nx<size-1 && ny<size-1 && maze[ny][nx]==0){

maze[y+d[1]/2][x+d[0]/2]=1
carve(nx,ny)

}

}

}

carve(1,1)

player={x:1,y:1}

}

function findEdgeExits(){

exits=[]

for(let x=1;x<size-1;x++){

if(maze[1][x]==1)exits.push({x:x,y:0})
if(maze[size-2][x]==1)exits.push({x:x,y:size-1})

}

for(let y=1;y<size-1;y++){

if(maze[y][1]==1)exits.push({x:0,y:y})
if(maze[y][size-2]==1)exits.push({x:size-1,y:y})

}

let farExits=exits.filter(e=>{
let dist=Math.abs(e.x-player.x)+Math.abs(e.y-player.y)
return dist > size*0.75
})

if(farExits.length>0){
activeExit=farExits[Math.floor(Math.random()*farExits.length)]
}else{
activeExit=exits[Math.floor(Math.random()*exits.length)]
}

}

function moveExit(){

activeExit=exits[Math.floor(Math.random()*exits.length)]

render()
flashMessage()

}

function checkExitProximity(){

if(forcedExitMoveTriggered) return
if(!activeExit) return

let dist=Math.abs(player.x-activeExit.x)+Math.abs(player.y-activeExit.y)

if(dist<=1){

forcedExitMoveTriggered=true

setTimeout(()=>{
moveExit()
},500)

}

}

function scheduleExitMove(){

let delay=(Math.random()*(15-5)+5)*60000

setTimeout(()=>{

moveExit()
scheduleExitMove()

},delay)

}

function flashMessage(){

document.body.classList.add("exitMoved")

setTimeout(()=>{
document.body.classList.remove("exitMoved")
},2000)

}

function triggerRush(){

if(rushActive)return

rushActive=true
rushCount++

let screen=document.getElementById("rushScreen")
let timer=document.getElementById("rushTimer")

screen.style.display="flex"

let count=10
timer.innerText=count

let interval=setInterval(()=>{

count--
timer.innerText=count

if(count<=0){

clearInterval(interval)
screen.style.display="none"
rushActive=false

}

},1000)

}

function render(){

let mazeDiv=document.getElementById("maze")

mazeDiv.style.gridTemplateColumns=`repeat(${size},1fr)`
mazeDiv.innerHTML=""

for(let y=0;y<size;y++){

for(let x=0;x<size;x++){

let d=document.createElement("div")
d.classList.add("cell")

if(activeExit && x==activeExit.x && y==activeExit.y){
d.classList.add("exit")
}

else if(x==player.x && y==player.y){
d.classList.add("player")
}

else if(maze[y][x]==1){
d.classList.add("path")
}

d.onclick=function(){
attemptMove(x,y)
}

mazeDiv.appendChild(d)

}

}

}

function attemptMove(x,y){

if(rushActive)return

if(cooldown){
triggerRush()
return
}

let now=Date.now()

if(now-lastClickTime<300){
triggerRush()
return
}

lastClickTime=now

let dx=Math.abs(player.x-x)
let dy=Math.abs(player.y-y)

if(dx+dy!=1)return

if(maze[y][x]==0 && !(activeExit && x==activeExit.x && y==activeExit.y))return

cooldown=true
setTimeout(()=>{listenForRush=true},50)

let mazeDiv=document.getElementById("maze")
mazeDiv.classList.add("locked")

let cells=mazeDiv.children
let index=player.y*size+player.x
let playerCell=cells[index]

playerCell.style.transition="opacity 2.5s linear"
playerCell.style.opacity="0"

setTimeout(()=>{

player.x=x
player.y=y

moves++
document.getElementById("moves").innerText=moves

checkExitProximity()

if(activeExit && x==activeExit.x && y==activeExit.y){
endGame()
return
}

render()

let newMaze=document.getElementById("maze")
let newIndex=player.y*size+player.x
let newCell=newMaze.children[newIndex]

newCell.style.opacity="0"

setTimeout(()=>{
newCell.style.transition="opacity 2.5s linear"
newCell.style.opacity="1"
},50)

},2500)

setTimeout(()=>{
cooldown=false
listenForRush=false
document.getElementById("maze").classList.remove("locked")
},5000)

}

function formatTime(seconds){

let h=Math.floor(seconds/3600)
let m=Math.floor((seconds%3600)/60)
let s=seconds%60

h=String(h).padStart(2,'0')
m=String(m).padStart(2,'0')
s=String(s).padStart(2,'0')

return `${h}:${m}:${s}s`

}

function endGame(){

clearInterval(timerInterval)

document.getElementById("gameScreen").classList.remove("active")
document.getElementById("endScreen").classList.add("active")

let time=Math.floor((Date.now()-startTime)/1000)

document.getElementById("finalStats").innerHTML=

`Maze Size Chosen: ${mazeSizeLabel} (${size} x ${size})<br><br>
Random Game ID: ${gameID}<br><br>
Time Elapsed: ${formatTime(time)}<br><br>
Times You Rushed: ${rushCount}<br><br>
Spaces Moved: ${moves}`

}

</script>
</body>
</html>
