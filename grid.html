<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfection’s Lucky Grid</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    color:#fff;
    text-align:center;

    background: linear-gradient(270deg, #ff00cc, #3333ff, #00ffcc, #ffcc00);
    background-size: 800% 800%;
    animation: neonBG 12s ease infinite;
}

@keyframes neonBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

#confetti{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:998;
}

/* 🎪 BIG CARNIVAL TITLE */
h1{
    margin:20px;
    font-size:42px;
    font-weight:bold;
    color:#fff;
    text-shadow:
        0 0 5px #fff,
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff0080,
        0 0 80px #ff0080;
    animation: flicker 2s infinite alternate;
}

@keyframes flicker{
    from{ opacity:1; }
    to{ opacity:0.85; }
}

#game{
    max-width:700px;
    margin:auto;
}

#board{
    background:#111;
    padding:15px;
    border-radius:12px;

    /* neon border */
    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff;

    border:3px solid #fff;

    margin:20px auto;
}

#grid{
    display:grid;
    grid-template-columns:repeat(11,1fr);
    gap:6px;
}

.cell{
    height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:bold;
    color:white;
    border-radius:6px;
    transition:transform 0.1s;
}

/* active selector */
.active{
    outline:4px solid white;
    transform:scale(1.1);
    z-index:2;
}

/* 🌟 WIN TILE */
.win{
    color:black;
    font-weight:bold;
    box-shadow:
        0 0 10px lime,
        0 0 20px lime,
        0 0 40px lime,
        0 0 80px lime;
    animation: winPulse 1s infinite alternate;
}

@keyframes winPulse{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
}

#stats{
    font-size:18px;
}

#message{
    margin-top:20px;
    font-size:28px;
    height:60px;
    font-weight:bold;
    text-shadow: 0 0 10px #fff;
}

#victory{
    display:none;
    padding:40px;
}
#overlayMessage{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -155%);
    
    font-size:64px;
    font-weight:bold;
    color:white;
    text-align:center;

    pointer-events:none;
    opacity:0;

    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ff0000;

    transition:opacity 0.5s ease;
    z-index:999;
}

#overlayMessage.show{
    opacity:1;
}
</style>
</head>

<body>

<div id="game">
    <h1>Perfection’s Lucky Grid</h1>

    <div id="board">
    <div id="grid"></div>
</div>

    <p>(Click anywhere to spin)</p>

    <div id="stats">
        Time: <span id="time">00:00:00</span><br>
        Failed Spins: <span id="fails">0</span>
    </div>

    <div id="message"></div>
</div>

<div id="victory">
    <h1>Congratulations!</h1>
    <p>You actually won. Did you have a good time?</p>
    <p>Total Time: <span id="finalTime"></span></p>
    <p>Total Spins: <span id="finalSpins"></span></p>
    <p>Game ID: <span id="gameId"></span></p>
</div>

<canvas id="confetti"></canvas>

const grid = document.getElementById("grid");
let cells = [];
let spinning = false;
let fails = 0;
let startTime = Date.now();
let currentIndex = 0;

const confettiCanvas = document.getElementById("confetti");
const ctx = confettiCanvas.getContext("2d");

function resizeCanvas(){
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function launchConfetti(){
    let pieces = [];

    for(let i=0;i<480;i++){
        pieces.push({
            x: Math.random() * confettiCanvas.width,
            y: -20,
            size: Math.random()*8+4,
            speed: Math.random()*3+2,
            angle: Math.random()*Math.PI*2,
            color: randomNeonColor(),
            rotation: Math.random()*360
        });
    }

    let duration = 2500;
    let start = Date.now();

    function animate(){
        let elapsed = Date.now() - start;

        ctx.clearRect(0,0,confettiCanvas.width, confettiCanvas.height);

        pieces.forEach(p=>{
            p.y += p.speed;
            p.x += Math.sin(p.angle);

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
            ctx.restore();
        });

        if(elapsed < duration){
            requestAnimationFrame(animate);
        }else{
            ctx.clearRect(0,0,confettiCanvas.width, confettiCanvas.height);
        }
    }

    animate();
}

function randomNeonColor(){
    const colors = [
        "#ff00ff","#00ffff","#ffff00",
        "#ff3300","#33ff00","#ff0080"
    ];
    return colors[Math.floor(Math.random()*colors.length)];
}

// build grid (1 win tile)
function randomColor(){
    const colors = [
        "#ff4d4d","#ff9933","#ffff33","#66ff66",
        "#33ccff","#6699ff","#cc66ff","#ff66cc"
    ];
    return colors[Math.floor(Math.random()*colors.length)];
}

function showOverlayMessage(text){
    const el = document.getElementById("overlayMessage");

    el.innerText = text;
    el.classList.add("show");

    // stay visible 3 seconds
    setTimeout(()=>{
        el.classList.remove("show");
    }, 3000);
}

function buildGrid(){
    grid.innerHTML="";
    cells=[];

    const size = 11;
    const total = size * size;
    const centerIndex = Math.floor(total / 2);

    for(let i=0;i<total;i++){
        let div = document.createElement("div");
        div.className="cell";

        div.style.background = randomColor();
        div.innerText="LOSE";

        if(i === centerIndex){
            div.classList.add("win");
            div.style.background = "lime";
            div.innerText="WIN";
        }

        grid.appendChild(div);
        cells.push(div);
    }
}

buildGrid();

// time tracker
setInterval(()=>{
    let t = Math.floor((Date.now()-startTime)/1000);
    let h = String(Math.floor(t/3600)).padStart(2,'0');
    let m = String(Math.floor((t%3600)/60)).padStart(2,'0');
    let s = String(t%60).padStart(2,'0');
    document.getElementById("time").innerText=`${h}:${m}:${s}`;
},1000);

// sounds
function beep(short=true){
    let a = new AudioContext();
    let o = a.createOscillator();
    o.frequency.value = short ? 800 : 200;
    o.connect(a.destination);
    o.start();
    o.stop(a.currentTime + (short?0.02:0.3));
}

// spin
document.body.addEventListener("click", ()=>{
    if(spinning) return;

    spinning = true;
    document.getElementById("message").innerText="";

    // TRUE RNG
    const steps = 300 + Math.floor(Math.random()*121);
    animateSteps(steps);
});

function animateSteps(totalSteps){
    let stepCount = 0;
    let start = Date.now();
    let duration = 20000;

    function step(){
        let t = (Date.now()-start)/duration;

        if(t >= 1){
            finishSpin();
            return;
        }

        // ease out controls how many steps we should be at
        let eased = 1 - Math.pow(1-t,3);
        let targetStep = Math.floor(eased * totalSteps);

        if(targetStep > stepCount){
            stepCount++;
            currentIndex = (currentIndex + 1) % 121;
            highlight(currentIndex);
            beep(true);
        }

        requestAnimationFrame(step);
    }

    step();
}

function highlight(i){
    cells.forEach(c=>c.classList.remove("active"));
    cells[i].classList.add("active");
}

function finishSpin(){
    spinning = false;

    beep(false);

    // CHECK ACTUAL TILE
    if(cells[currentIndex].classList.contains("win")){
        showVictory();
    }else{
        fails++;
		if(Math.random() < 0.05){
    launchConfetti();
}
        document.getElementById("fails").innerText=fails;

        let msg = messages[Math.floor(Math.random()*messages.length)];
        showOverlayMessage(msg);
    }
}

// victory
function showVictory(){
    document.getElementById("game").style.display="none";
    document.getElementById("victory").style.display="block";

    document.getElementById("finalTime").innerText =
        document.getElementById("time").innerText;

    document.getElementById("finalSpins").innerText = fails + 1;

    let id = Math.floor(100000000 + Math.random()*900000000);
    document.getElementById("gameId").innerText = id;
}
</script>
