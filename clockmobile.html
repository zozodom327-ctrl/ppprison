<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch the Clock</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:#eee;
    text-align:center;
}

.screen{display:none; padding:20px;}
.active{display:block;}

h1{
    font-size:40px;
    letter-spacing:2px;
    color:#bbb;
    font-family:'Segoe UI', Arial, sans-serif;
}

#clock{
    width:65vmin;
    height:65vmin;
    border:1.2vmin solid #444;
    border-radius:50%;
    margin:20px auto;
    position:relative;
    background:#222;
    opacity:0.55;
    transition:0.3s;
}

.hand{
    position:absolute;
    left:50%;
    bottom:50%;
    transform-origin:bottom;
}

.hour{width:1.5vmin; height:18vmin; background:#fff;}
.minute{width:1vmin; height:26vmin; background:#ccc;}
.second{width:0.5vmin; height:30vmin; background:#888;}

.running{border-color:#2a7;}
.paused{border-color:#a22;}

#prompt{
    font-size:18px;
    margin-top:10px;
}

#failTimer{
    font-size:28px;
    color:#ff4444;
    display:none;
}

#buttons{
    display:none;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    max-width:300px;
    margin:20px auto;
}

#buttons button{
    padding:20px;
    font-size:20px;
    background:#333;
}

#hypno{
    position:fixed;
    top:42%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:8vmin;
    width:90vw;
    text-align:center;
    opacity:0;
    pointer-events:none;
    color:#ff2222;
    font-weight:bold;
    z-index:9999;
    transition:opacity 5s linear;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
}

.startBox{
    background:#222;
    padding:30px;
    border-radius:10px;
    display:inline-block;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="startScreen" class="screen active">
<div class="startBox">
<h1>WATCH THE CLOCK</h1>

<p>How long will you endure?</p>

Hours: <input type="number" id="hours" value="0"><br><br>
Minutes: <input type="number" id="minutes" value="1"><br><br>

<label>
<input type="checkbox" id="mobileToggle">
 Mobile Version
</label>

<p>
Hold the correct input.<br>
Release it, and time stops.<br>
Release for 5 seconds… you lose everything.
</p>

<button onclick="startGame()">BEGIN</button>
</div>
</div>

<div id="gameScreen" class="screen">
<h1>WATCH THE CLOCK</h1>

<div id="clock"><div id="hypno"></div></div>

<div id="prompt">Hold the _ key</div>
<div id="failTimer">5</div>

<div id="buttons"></div>
</div>

<div id="endScreen" class="screen">
<h1>WATCH THE CLOCK</h1>
<h2>You endured.</h2>
<p id="finalTime"></p>
<p id="gameID"></p>
<button onclick="location.reload()">Play Again</button>
</div>

<script>
let mobileMode = false;

let targetTime=0, elapsed=0, holdingKey=false;
let currentKey="";
let failCountdown=5, failInterval=null;
let gameInterval, switchTimer=0;

// MOBILE BUTTONS
const letters=["A","B","C","D"];
const btnContainer=document.getElementById("buttons");
let buttons=[];

letters.forEach(l=>{
    const b=document.createElement("button");
    b.innerText=l;

    b.addEventListener("touchstart",()=>{
        if(l===currentKey){
            holdingKey=true;
            stopFailTimer();
            startTicking();
        }
    });

    b.addEventListener("touchend",()=>{
        if(l===currentKey){
            holdingKey=false;
            startFailTimer();
            stopTicking();
        }
    });

    btnContainer.appendChild(b);
    buttons.push(b);
});

// CLOCK
const clock=document.getElementById("clock");
const hour=document.createElement("div");
const minute=document.createElement("div");
const second=document.createElement("div");
hour.className="hand hour";
minute.className="hand minute";
second.className="hand second";
clock.appendChild(hour);
clock.appendChild(minute);
clock.appendChild(second);

// START
function startGame(){
    mobileMode = document.getElementById("mobileToggle").checked;

    if(mobileMode){
        document.getElementById("buttons").style.display="grid";
    }

    const h=parseInt(hours.value)||0;
    const m=parseInt(minutes.value)||0;
    targetTime=(h*60+m)*60;

    startScreen.classList.remove("active");
    gameScreen.classList.add("active");

    pickNewKey(true);
    gameInterval=setInterval(gameLoop,1000);
}

// LOOP
function gameLoop(){
    if(holdingKey){
        elapsed++;
        updateClock();
        clock.className="running";
    }

    switchTimer++;
    if(switchTimer>=rand(30,60)){
        switchTimer=0;
        keyWarning();
    }

    if(elapsed>=targetTime) endGame();
}

function updateClock(){
    const s=elapsed%60;
    const m=Math.floor(elapsed/60)%60;
    const h=Math.floor(elapsed/3600)%12;

    second.style.transform=`rotate(${s*6}deg)`;
    minute.style.transform=`rotate(${m*6}deg)`;
    hour.style.transform=`rotate(${h*30}deg)`;
}

// KEYBOARD INPUT
document.addEventListener("keydown",e=>{
    if(!mobileMode && e.key===currentKey){
        holdingKey=true;
        stopFailTimer();
        startTicking();
    }
});

document.addEventListener("keyup",e=>{
    if(!mobileMode && e.key===currentKey){
        holdingKey=false;
        startFailTimer();
        stopTicking();
    }
});

// FAIL
function startFailTimer(){
    if(failInterval) return;

    failCountdown=5;
    failTimer.innerText=failCountdown;
    failTimer.style.display="block";
    clock.className="paused";

    failInterval=setInterval(()=>{
        failCountdown--;
        failTimer.innerText=failCountdown;
        if(failCountdown<=0) location.reload();
    },1000);
}

function stopFailTimer(){
    clearInterval(failInterval);
    failInterval=null;
    failTimer.style.display="none";
}

// KEY SYSTEM
function pickNewKey(forceFail=false){
    if(mobileMode){
        currentKey=letters[Math.floor(Math.random()*letters.length)];
        prompt.innerText="Hold button "+currentKey;
    } else {
        const keys="abcdefghijklmnopqrstuvwxyz";
        currentKey=keys[Math.floor(Math.random()*keys.length)];
        prompt.innerText="Hold '"+currentKey+"' key";
    }

    if(forceFail){
        holdingKey=false;
        startFailTimer();
    }
}

function keyWarning(){
    let c=5;
    const w=setInterval(()=>{
        prompt.innerText="Changing in "+c;
        c--;
        if(c<0){
            clearInterval(w);
            pickNewKey(true);
        }
    },1000);
}

// SOUND
let tickInterval=null, audioCtx=null;

function startTicking(){
    if(tickInterval) return;

    if(!audioCtx){
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    }
    audioCtx.resume();

    tickInterval=setInterval(()=>{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();

        o.type="sine";
        o.frequency.setValueAtTime(800,audioCtx.currentTime);

        g.gain.setValueAtTime(0.08,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);

        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+0.1);
    },1000);
}

function stopTicking(){
    clearInterval(tickInterval);
    tickInterval=null;
}

// END
function endGame(){
    clearInterval(gameInterval);
    stopTicking();

    gameScreen.classList.remove("active");
    endScreen.classList.add("active");

    finalTime.innerText="Time endured: "+formatTime(elapsed);
    gameID.innerText="Game ID: "+generateID();
}

// UTIL
function formatTime(s){
    return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}`;
}
function pad(n){return n<10?"0"+n:n;}
function generateID(){return Math.floor(100000000+Math.random()*900000000);}
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
</script>

</body>
</html>
