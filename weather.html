<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Femdom Weather Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #4a9eff;
    --accent-dim: #1a3a5c;
    --text-primary: #e8e8f0;
    --text-secondary: #7878a0;
    --text-dim: #3a3a5a;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
    --body: 'Inter', sans-serif;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--body);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 60px 2rem 50px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
  }

  /* Top bar — no live transmission, just date */
  .hud-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    z-index: 100;
  }

  .hud-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 36px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    z-index: 100;
  }

  /* Big title above the card */
  .site-title {
    position: relative;
    z-index: 1;
    font-family: var(--display);
    font-size: clamp(2rem, 6.5vw, 4.4rem);
    letter-spacing: -0.01em;
    line-height: 0.88;
    text-align: center;
    margin-bottom: 1.2rem;
    color: var(--text-primary);
    text-shadow:
      0 0 40px rgba(74,158,255,0.12),
      2px 2px 0px #0a0a0f,
      3px 3px 0px rgba(74,158,255,0.1);
  }
  .site-title span {
    color: var(--accent);
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2.5rem;
  }

  /* Loading */
  #loading { text-align: center; }
  .loading-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 1.5rem;
  }
  .loading-bar-wrap {
    width: 200px; height: 1px;
    background: var(--border);
    margin: 0 auto; overflow: hidden;
  }
  .loading-bar {
    height: 100%; width: 0%;
    background: var(--accent);
    animation: load 2s ease-in-out infinite;
  }
  @keyframes load {
    0%   { width: 0%;  margin-left: 0%; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0%;  margin-left: 100%; }
  }

  #error { display: none; text-align: center; }
  #error p { color: var(--text-secondary); font-size: 14px; margin-top: 0.5rem; }
  #weather { display: none; }

  .transmission-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }

  .location-name {
    font-family: var(--display);
    font-size: clamp(2.5rem, 8vw, 5rem);
    line-height: 0.9;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }

  .location-coords {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 2rem;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* Temp + condition + weather symbol row */
  .temp-row {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .temp-main {
    font-family: var(--display);
    font-size: clamp(4rem, 15vw, 8rem);
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .temp-unit {
    font-family: var(--display);
    font-size: 2rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
  }
  .condition-block {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 0.5rem;
    flex: 1;
  }
  .weather-icon {
    margin-bottom: 0.5rem;
  }
  .weather-icon svg {
    width: 72px;
    height: 72px;
    display: block;
  }
  .condition-text {
    font-family: var(--display);
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .feels-like {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 0.25rem;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-top: 1.5rem;
  }
  .stat { background: var(--surface); padding: 1rem; }
  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--text-primary);
  }
  .stat-unit { font-size: 11px; color: var(--text-secondary); }

  .range-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-secondary);
  }
  .range-bar-wrap {
    flex: 1; height: 3px;
    background: var(--border);
    position: relative;
  }
  .range-bar {
    position: absolute;
    height: 100%;
    background: linear-gradient(90deg, #1a4a8a, var(--accent));
  }
  .range-label { white-space: nowrap; }

  .sun-row {
    display: flex;
    gap: 2rem;
    margin-top: 1.2rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-secondary);
  }
  .sun-item span {
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 2px;
  }

  .next-change {
    margin-top: 1.5rem;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: right;
  }
</style>
</head>
<body>

<div class="hud-top">
  <span id="hud-date">—</span>
  <span>FEMDOM WEATHER REPORT</span>
  <span></span>
</div>

<!-- Big stylised title above the card -->
<div class="site-title">FEMDOM<br><span>WEATHER</span> REPORT</div>

<div class="card">
  <div id="loading">
    <div class="loading-label">ACQUIRING SIGNAL</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  </div>

  <div id="error">
    <div class="location-name" style="font-size:2rem; color:#555;">SIGNAL LOST</div>
    <p id="error-msg">Unable to retrieve weather data.</p>
  </div>

  <div id="weather">
    <div class="location-name" id="loc-name">—</div>
    <div class="location-coords" id="loc-coords">—</div>

    <div class="divider"></div>

    <div class="temp-row">
      <div>
        <div style="display:flex; align-items:flex-start; gap:4px;">
          <div class="temp-main" id="temp-val">—</div>
          <div class="temp-unit">°C</div>
        </div>
      </div>
      <div class="condition-block">
        <div class="weather-icon" id="weather-icon"></div>
        <div class="condition-text" id="condition">—</div>
        <div class="feels-like" id="feels">LOW — °C</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">FEELS LIKE</div>
        <div class="stat-value"><span id="humidity">—</span><span class="stat-unit">°C</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">WIND MAX</div>
        <div class="stat-value"><span id="wind">—</span><span class="stat-unit">km/h</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">PRECIP</div>
        <div class="stat-value"><span id="precip">—</span><span class="stat-unit">mm</span></div>
      </div>
    </div>

    <div class="range-row">
      <span class="range-label" id="temp-low">—</span>
      <div class="range-bar-wrap">
        <div class="range-bar" id="range-bar" style="left:0%;width:100%"></div>
      </div>
      <span class="range-label" id="temp-high">—</span>
    </div>

    <div class="sun-row">
      <div class="sun-item"><span>SUNRISE</span><span id="sunrise">—</span></div>
      <div class="sun-item"><span>SUNSET</span><span id="sunset">—</span></div>
      <div class="sun-item"><span>UV INDEX</span><span id="uv">—</span></div>
    </div>

    <div class="next-change" id="next-change">NEXT LOCATION ASSIGNED IN —</div>
  </div>
</div>

<div class="hud-bottom">
  <span>WEATHER DATA: OPEN-METEO.COM</span>
  <span id="hud-coords">—</span>
  <span>DESIGNED BY PERFECTION</span>
</div>

// ─── CEST date seed ───────────────────────────────────────────────────────────
// CEST = UTC+2. We derive the date in CEST so the day rolls over at midnight CEST.
function getCESTDateString() {
  const now = new Date();
  // CEST offset: UTC+2 (May–Oct). We always use +2 for simplicity (covers CEST).
  // If you want CET (UTC+1) in winter too, you can adjust, but CEST is the stated requirement.
  const cestOffset = 2 * 60; // minutes
  const cestMs = now.getTime() + (cestOffset - now.getTimezoneOffset()) * 60000;
  // Actually cleaner: just add 2h to UTC
  const utcMs = now.getTime();
  const cestDate = new Date(utcMs + 2 * 3600 * 1000);
  const y = cestDate.getUTCFullYear();
  const m = String(cestDate.getUTCMonth() + 1).padStart(2,'0');
  const d = String(cestDate.getUTCDate()).padStart(2,'0');
  return `${y}${m}${d}`;
}

function getTodaySeed() {
  return parseInt(getCESTDateString(), 10);
}

function getTodayDisplayString() {
  const now = new Date();
  const cestDate = new Date(now.getTime() + 2 * 3600 * 1000);
  return cestDate.toLocaleDateString('en-GB', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC'
  });
}

function getDayOfYear() {
  const now = new Date();
  const cestDate = new Date(now.getTime() + 2 * 3600 * 1000);
  const start = new Date(Date.UTC(cestDate.getUTCFullYear(), 0, 0));
  return Math.floor((cestDate - start) / 86400000);
}

// ─── PRNG ─────────────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

  const now = new Date();

  const cestNow = new Date(now.getTime() + 2*3600*1000);
  const nextMidnightCEST = new Date(Date.UTC(cestNow.getUTCFullYear(), cestNow.getUTCMonth(), cestNow.getUTCDate()+1));
  // That's midnight UTC of the next CEST date, then subtract 2h to get real UTC time
  const nextMidnightUTC = new Date(nextMidnightCEST.getTime() - 2*3600*1000);
  const diff = nextMidnightUTC - now;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  return `${h}h ${m}m`;
}

function formatTime(isoStr) {
  if (!isoStr) return '—';
  const t = new Date(isoStr);
  return t.toUTCString().slice(17,22);
}

// ─── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  const [lat,lon,city,country] = getDailyLocation();
  const seed = getTodaySeed();
  const day = getDayOfYear();

  document.getElementById('hud-date').textContent = getTodayDisplayString();
  document.getElementById('hud-coords').textContent = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    +`&daily=temperature_2m_max,temperature_2m_min,apparent_temperature_max,precipitation_sum,weather_code,wind_speed_10m_max,wind_direction_10m_dominant,uv_index_max,sunrise,sunset`
    +`&timezone=UTC&forecast_days=1`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const d = data.daily;

    const tMax = d.temperature_2m_max[0];
    const tMin = d.temperature_2m_min[0];
    const tRange = tMax - tMin || 1;

    document.getElementById('loc-name').textContent = city;
    document.getElementById('loc-coords').textContent =
      `${Math.abs(lat).toFixed(4)}°${lat>=0?'N':'S'}, ${Math.abs(lon).toFixed(4)}°${lon>=0?'E':'W'} — ${country}`;

    document.getElementById('temp-val').textContent = Math.round(tMax);
    document.getElementById('weather-icon').innerHTML = getIcon(d.weather_code[0]);
    document.getElementById('condition').textContent = wmoDescription(d.weather_code[0]);
    document.getElementById('feels').textContent = `LOW ${Math.round(tMin)}°C`;
    document.getElementById('humidity').textContent = Math.round(d.apparent_temperature_max[0]);
    document.getElementById('wind').textContent =
      `${Math.round(d.wind_speed_10m_max[0])} ${windDirection(d.wind_direction_10m_dominant[0])}`;
    document.getElementById('precip').textContent = d.precipitation_sum[0].toFixed(1);

    document.getElementById('temp-low').textContent = `${Math.round(tMin)}°C`;
    document.getElementById('temp-high').textContent = `${Math.round(tMax)}°C`;
    document.getElementById('range-bar').style.left='0%';
    document.getElementById('range-bar').style.width='100%';

    document.getElementById('sunrise').textContent = formatTime(d.sunrise[0]);
    document.getElementById('sunset').textContent = formatTime(d.sunset[0]);
    document.getElementById('uv').textContent = d.uv_index_max[0]??'—';

    document.getElementById('next-change').textContent =
      `NEXT LOCATION ASSIGNED IN ${hoursUntilCESTMidnight()}`;

    document.getElementById('loading').style.display='none';
    document.getElementById('weather').style.display='block';

  } catch(err) {
    document.getElementById('loading').style.display='none';
    document.getElementById('error').style.display='block';
    document.getElementById('error-msg').textContent=`${err.message}`;
    console.error(err);
  }
}

init();
</script>
