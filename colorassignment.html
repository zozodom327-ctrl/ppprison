<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Identification Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
<style>
    body {
    font-family: 'Fredoka', sans-serif;
    background: #ff4d6d;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 30px;
    margin: 0;
    transition: background-color 4s ease-in-out;
	font-size: clamp(16px, 2.5vw, 20px);
}

#endScreen #stats {
    font-size: 26px;
    font-weight: bold;
    margin: 20px 0;
    line-height: 1.6;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
}

/* Main container */
.container {
    width: 90%;
    max-width: 520px;
    text-align: center;
    background: rgb(255, 182, 193); /* soft pastel pink */
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
	margin-top: 100px;
	border: 6px solid white;
}

/* Headings */
h1, h2, h3 {
    font-family: 'Luckiest Guy', cursive;
    letter-spacing: 2px;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.4);
}

/* Timer big and dramatic */
#timer {
    font-size: 32px;
    color: #fff700;
    text-shadow: 2px 2px 0px #000;
    margin-bottom: 15px;
}

/* Input */
input {
    padding: 12px;
    margin: 15px 0;
    width: 85%;
    font-size: 20px;
    border-radius: 15px;
    border: 3px solid white;
    text-align: center;
    font-weight: bold;
    background: white;
    color: black;
}

/* Buttons */
button {
    padding: 12px 25px;
    font-size: 20px;
    background: #fff700;
    color: black;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 6px 0 #d4c200;
    transition: all 0.15s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 #d4c200;
}

button:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #d4c200;
}

button:disabled {
    background: grey;
    box-shadow: none;
    transform: none;
    cursor: not-allowed;
}

/* Feedback */
#feedback {
    font-weight: bold;
    font-size: 18px;
    margin-top: 10px;
}

/* Processing text */
#loadingMessage {
    font-weight: bold;
    font-size: 18px;
    margin-top: 15px;
}

/* Rainbow Carnival Title */
.rainbow-title {
    text-align: center;
    font-family: 'Luckiest Guy', cursive;
    font-size: 48px;
    pointer-events: none;
	margin-bottom: 10px;
}

.rainbow-title span {
    display: inline-block;
    transform-origin: bottom center;

    /* REMOVE old subtle shadow if present */
    text-shadow: none;

    /* Add bold black outline */
    -webkit-text-stroke: 3px white;

    /* Fallback for browsers that ignore stroke */
    text-shadow:
        2px 2px 0 white,
       -2px 2px 0 white,
        2px -2px 0 white,
       -2px -2px 0 white;
}
/* Arch effect */
.rainbow-title span:nth-child(1)  { transform: rotate(-20deg) translateY(20px); color: #ff006e; }
.rainbow-title span:nth-child(2)  { transform: rotate(-17deg) translateY(16px); color: #ff9f1c; }
.rainbow-title span:nth-child(3)  { transform: rotate(-14deg) translateY(12px); color: #ffbe0b; }
.rainbow-title span:nth-child(4)  { transform: rotate(-11deg) translateY(9px);  color: #06d6a0; }
.rainbow-title span:nth-child(5)  { transform: rotate(-8deg)  translateY(6px);  color: #3a86ff; }
.rainbow-title span:nth-child(6)  { transform: rotate(-5deg)  translateY(4px);  color: #8338ec; }
.rainbow-title span:nth-child(7)  { transform: rotate(-2deg)  translateY(2px);  color: #ff4d6d; }
.rainbow-title span:nth-child(8)  { transform: rotate(0deg);                    color: #2ec4b6; }
.rainbow-title span:nth-child(9)  { transform: rotate(2deg)   translateY(2px);  color: #ff006e; }
.rainbow-title span:nth-child(10) { transform: rotate(5deg)   translateY(4px);  color: #ff9f1c; }
.rainbow-title span:nth-child(11) { transform: rotate(8deg)   translateY(6px);  color: #ffbe0b; }
.rainbow-title span:nth-child(12) { transform: rotate(11deg)  translateY(9px);  color: #06d6a0; }
.rainbow-title span:nth-child(13) { transform: rotate(14deg)  translateY(12px); color: #3a86ff; }
.rainbow-title span:nth-child(14) { transform: rotate(17deg)  translateY(16px); color: #8338ec; }
.rainbow-title span:nth-child(15) { transform: rotate(20deg)  translateY(20px); color: #ff4d6d; }
.rainbow-title span:nth-child(16) { transform: rotate(23deg)  translateY(24px); color: #ff9f1c; }
.rainbow-title span:nth-child(17) { transform: rotate(26deg)  translateY(28px); color: #ffbe0b; }
.rainbow-title span:nth-child(18) { transform: rotate(29deg)  translateY(32px); color: #06d6a0; }
.rainbow-title span:nth-child(19) { transform: rotate(32deg)  translateY(36px); color: #3a86ff; }
.rainbow-title span:nth-child(20) { transform: rotate(35deg)  translateY(40px); color: #8338ec; }
.rainbow-title span:nth-child(21) { transform: rotate(38deg)  translateY(44px); color: #ff006e; }
.rainbow-title span:nth-child(22) { transform: rotate(41deg)  translateY(48px); color: #ff9f1c; }
.rainbow-title span:nth-child(23) { transform: rotate(44deg)  translateY(52px); color: #ffbe0b; }
.rainbow-title span:nth-child(24) { transform: rotate(47deg)  translateY(56px); color: #06d6a0; }
.rainbow-title span:nth-child(25) { transform: rotate(50deg)  translateY(60px); color: #3a86ff; }


</style>
</head>
<body>

<div class="rainbow-title">
  <span>P</span>
  <span>e</span>
  <span>r</span>
  <span>f</span>
  <span>e</span>
  <span>c</span>
  <span>t</span>
  <span>i</span>
  <span>o</span>
  <span>n</span>
  <span>'</span>
  <span>s</span>
  &nbsp;
  <span>C</span>
  <span>o</span>
  <span>l</span>
  <span>o</span>
  <span>r</span>
  &nbsp;
  <span>P</span>
  <span>a</span>
  <span>l</span>
  <span>a</span>
  <span>c</span>
  <span>e</span>
  <span>!</span>
</div>

<div class="container" id="startScreen">
    <h2>I HAVE BEEN ASSIGNED TO IDENTIFY</h2>
    <input type="number" id="quantityInput" min="1" max="1000" placeholder="ENTER NUMBER (1-1000)">
    <h2>COLORED THINGS.</h2>
    <button onclick="startGame()">BEGIN ASSIGNMENT</button>
    <br>
    <p>Available Options:</p>
    <p><i>red / green / orange / blue / yellow / pink / purple / black / white / gray / silver / gold</i></p>
    <div id="startError" style="color:red;"></div>
</div>

<div class="container" id="gameScreen" style="display:none;">
    <div id="timer">TIME: 00:00:00s</div>
    <div id="progress"></div>
    <h2 id="questionText"></h2>
    <input type="text" id="answerInput" placeholder="ENTER COLOR">
    <button id="submitButton" onclick="submitAnswer()">SUBMIT</button>
    <div id="feedback"></div>
    <div id="loadingMessage"></div>
</div>

<div class="container" id="endScreen" style="display:none;">
    <h1>ASSIGNMENT COMPLETE</h1>
    <p id="stats"></p>
    <button onclick="location.reload()">RESTART</button>
</div>

<audio id="buzzSound">
    <source src="https://actions.google.com/sounds/v1/alarms/buzzer.ogg" type="audio/ogg">
</audio>



<script>
let totalRequired = 0;
let correctCount = 0;
let startTime;
let timerInterval;
let currentItem;
let isLocked = false;

const baseObjects = [
/* ADDITIONAL OBJECTS */

{ name: "A RADISH", color: "red" },

{ name: "A LADYBUG", color: "red" },
{ name: "BEETROOT", color: "red" },
{ name: "A CHILI PEPPER", color: "red" },

{ name: "THE OCEAN", color: "blue" },
{ name: "A RAINDROP", color: "blue" },
{ name: "THE SKY", color: "blue" },

{ name: "A WHALE", color: "blue" },

{ name: "A LEAF", color: "green" },

{ name: "A VINE", color: "green" },

{ name: "A BANANA", color: "yellow" },
{ name: "THE SUN", color: "yellow" },
{ name: "A CANARY", color: "yellow" },
{ name: "A BEE", color: "yellow" },
{ name: "GOLD", color: "yellow" },
{ name: "A HAY BALE", color: "yellow" },
{ name: "A PINEAPPLE", color: "yellow" },
{ name: "A CHEESE SLICE", color: "yellow" },
{ name: "MUSTARD", color: "yellow" },
{ name: "SAND", color: "yellow" },

{ name: "A MANDARIN", color: "orange" },
{ name: "A TRAFFIC CONE", color: "orange" },
{ name: "A LIFE JACKET", color: "orange" },
{ name: "A BASKETBALL", color: "orange" },
{ name: "A GOLDFISH", color: "orange" },
{ name: "A MAPLE LEAF", color: "orange" },
{ name: "A SWEET POTATO", color: "orange" },
{ name: "AN ORANGE", color: "orange" },
{ name: "A PUMPKIN", color: "orange" },
{ name: "A SAFETY VEST", color: "orange" },

{ name: "A GRAPE", color: "purple" },
{ name: "A PLUM", color: "purple" },
{ name: "AN EGGPLANT", color: "purple" },
{ name: "A VIOLET FLOWER", color: "purple" },
{ name: "A LILAC", color: "purple" },
{ name: "LAVENDER", color: "purple" },
{ name: "AN AMETHYST", color: "purple" },

{ name: "A CLOUD", color: "white" },
{ name: "A PORCELAIN CUP", color: "white" },
{ name: "A TOOTH", color: "white" },
{ name: "A PILLOW", color: "white" },
{ name: "PAPER", color: "white" },
{ name: "A CANDLE", color: "white" },
{ name: "A PLATE", color: "white" },
{ name: "A DOVE", color: "white" },
{ name: "A SWAN", color: "white" },
{ name: "CHALK", color: "white" },

{ name: "A PANDA", color: "black" },
{ name: "A TUXEDO", color: "black" },
{ name: "A BAT", color: "black" },
{ name: "A CROW", color: "black" },
{ name: "A SHADOW", color: "black" },
{ name: "CHARCOAL", color: "black" },
{ name: "A PIANO", color: "black" },
{ name: "A BOWLER HAT", color: "black" },
{ name: "THE NIGHT", color: "black" },
{ name: "A RAVEN", color: "black" },

{ name: "TREE BARK", color: "brown" },
{ name: "A WALNUT SHELL", color: "brown" },
{ name: "A COFFEE BEAN", color: "brown" },
{ name: "A PAPER BAG", color: "brown" },
{ name: "A CARDBOARD BOX", color: "brown" },
{ name: "A DEER", color: "brown" },
{ name: "A HORSE", color: "brown" },
{ name: "A BISON", color: "brown" },
{ name: "A COCONUT", color: "brown" },
{ name: "A CHESTNUT", color: "brown" },

/* EXTRA MIXED SIMPLE ITEMS */

{ name: "A FLAMINGO", color: "pink" },
{ name: "COTTON CANDY", color: "pink" },
{ name: "A PIG", color: "pink" },
{ name: "A ROSE PETAL", color: "pink" },
{ name: "A PEONY", color: "pink" },

{ name: "A SPOON", color: "silver" },
{ name: "A COIN", color: "silver" },
{ name: "TINFOIL", color: "silver" },
{ name: "A FORK", color: "silver" },
{ name: "A METAL KEY", color: "silver" },

{ name: "A GOLD BAR", color: "gold" },
{ name: "A TROPHY", color: "gold" },
{ name: "A MEDAL", color: "gold" },
{ name: "A WEDDING RING", color: "gold" },
{ name: "A CROWN", color: "gold" },

{ name: "ASH", color: "gray" },
{ name: "A STORM CLOUD", color: "gray" },
{ name: "A ROCK", color: "gray" },
{ name: "A PEBBLE", color: "gray" },
{ name: "A SIDEWALK", color: "gray" }

];

const backgroundColors = [
    "#ff4d6d",  // hot pink
    "#ff9f1c",  // orange
    "#2ec4b6",  // teal
    "#3a86ff",  // bright blue
    "#ff006e",  // magenta
    "#8338ec",  // purple
    "#ffbe0b",  // yellow
    "#06d6a0"   // mint
];

let objectPool = [];
for (let i = 0; i < 100; i++) {
    baseObjects.forEach(obj => objectPool.push(obj));
}

function startGame() {
    const input = document.getElementById("quantityInput").value;
    const error = document.getElementById("startError");

    if (input < 1 || input > 1000) {
        error.textContent = "INVALID ENTRY. ENTER 1-1000.";
        return;
    }

    totalRequired = parseInt(input);
    correctCount = 0;
    startTime = new Date();

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    timerInterval = setInterval(updateTimer, 1000);
    nextQuestion();
}

function changeBackgroundColor() {

    const randomIndex = Math.floor(Math.random() * backgroundColors.length);
    const newColor = backgroundColors[randomIndex];

    document.body.style.backgroundColor = newColor;
}

function updateTimer() {
    const now = new Date();
    const totalSeconds = Math.floor((now - startTime) / 1000);

    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    const formattedTime =
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0') + "s";

    document.getElementById("timer").textContent =
        "TIME: " + formattedTime;
}

function nextQuestion() {
    if (correctCount >= totalRequired) {
        endGame();
        return;
    }

    currentItem = objectPool[Math.floor(Math.random() * objectPool.length)];

    document.getElementById("progress").textContent =
        "IDENTIFIED: " + correctCount + " / " + totalRequired;

    document.getElementById("questionText").textContent =
        "WHAT COLOR IS " + currentItem.name + "?";

    document.getElementById("answerInput").value = "";
    document.getElementById("feedback").textContent = "";
    document.getElementById("loadingMessage").textContent = "";
    document.getElementById("answerInput").disabled = false;
    document.getElementById("submitButton").disabled = false;
    document.getElementById("answerInput").focus();

    isLocked = false;
	
}

function submitAnswer() {
    if (isLocked) return;

    const userAnswer = document.getElementById("answerInput").value
        .trim()
        .toLowerCase();

    if (userAnswer === currentItem.color.toLowerCase()) {
        correctCount++;
        lockAndDelay();
    } else {
        document.getElementById("feedback").textContent = "INCORRECT, TRY AGAIN.";
        document.getElementById("buzzSound").play();
    }
}

function lockAndDelay() {
    isLocked = true;
    document.getElementById("answerInput").disabled = true;
    document.getElementById("submitButton").disabled = true;

    let countdown = 5;
    const loadingMessage = document.getElementById("loadingMessage");

    loadingMessage.textContent =
        "PROCESSING NEXT OBJECT... " + countdown;

    changeBackgroundColor();   // ✅ TRIGGER FADE HERE

    const interval = setInterval(() => {
        countdown--;
        loadingMessage.textContent =
            "PROCESSING NEXT OBJECT... " + countdown;

        if (countdown <= 0) {
            clearInterval(interval);
            nextQuestion();
        }
    }, 1000);
}

function generateGameId() {
    let id = "";
    for (let i = 0; i < 9; i++) {
        id += Math.floor(Math.random() * 10);
    }
    return id;
}

function endGame() {
    clearInterval(timerInterval);

    const endTime = new Date();
    const totalSeconds = Math.floor((endTime - startTime) / 1000);

    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    const formattedTime =
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0') + "s";

    const gameId = generateGameId(); // ✅ ACTUALLY CREATE IT

    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("endScreen").style.display = "block";

    document.getElementById("stats").innerHTML =
        "NUMBER OF COLORED THINGS IDENTIFIED: " + totalRequired +
        "<br>TOTAL TIME TAKEN: " + formattedTime +
        "<br><br>GAMEID: " + gameId;
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        submitAnswer();
    }
});
</script>

</html>
